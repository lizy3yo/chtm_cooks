<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- PWA Meta Tags -->
		<meta name="application-name" content="CHTM Cooks" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="CHTM Cooks" />
		<meta name="description" content="Professional laboratory equipment management system for CHTM students, instructors, and custodians." />
		<meta name="format-detection" content="telephone=no" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="theme-color" content="#e91e63" />

		<!-- Apple Touch Icons -->
		<link rel="apple-touch-icon" href="/pwa-192x192.png" />
		<link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png" />
		<link rel="apple-touch-icon" sizes="512x512" href="/pwa-512x512.png" />

		<!-- Favicon -->
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

		<!-- Theme init: apply 'dark' class early to avoid flash -->
		<script>
			(function(){
				try{
					var theme = localStorage.getItem('theme');
					if(theme === 'dark') document.documentElement.classList.add('dark');
				}catch(e){}
			})();
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
