<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<!-- PWA Meta Tags -->
	<meta name="application-name" content="CHTM Cooks" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="default" />
	<meta name="apple-mobile-web-app-title" content="CHTM Cooks" />
	<meta name="description"
		content="Professional laboratory equipment management system for CHTM students, instructors, and custodians." />
	<meta name="format-detection" content="telephone=no" />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="theme-color" content="#e91e63" />

	<!-- Apple Touch Icons -->
	<link rel="apple-touch-icon" href="/pwa-192x192.png" />
	<link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png" />
	<link rel="apple-touch-icon" sizes="512x512" href="/pwa-512x512.png" />

	<!-- Favicon -->
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

	<!-- PWA Manifest -->
	<link rel="manifest" href="/manifest.webmanifest" />

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
		rel="stylesheet" />

	<!-- PWA Service Worker Registration -->
	<script>
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', function () {
				navigator.serviceWorker.register('/sw.js', { scope: '/' })
					.then(function (registration) {
						console.log('✅ PWA: Service Worker registered successfully', registration.scope);
					})
					.catch(function (error) {
						console.error('❌ PWA: Service Worker registration failed:', error);
					});
			});
		} else {
			console.warn('⚠️ PWA: Service Workers not supported in this browser');
		}
	</script>

	<!-- Theme init: apply 'dark' class early to avoid flash -->
	<script>
		(function () {
			try {
				var theme = localStorage.getItem('theme');
				if (theme === 'dark') document.documentElement.classList.add('dark');
			} catch (e) { }
		})();
	</script>

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover" class="font-primary">
	<div style="display: contents">%sveltekit.body%</div>

</body>

</html>
